{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card">

<div class="card-header bg-success text-white">

Generate Bill

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<label>Patient</label>

<select name="patient" class="form-select">

{% for p in patients %}

<option value="{{ p.id }}">{{ p.name }}</option>

{% endfor %}

</select>

<br>

<label>Appointment</label>

<select name="appointment" class="form-select">

{% for a in appointments %}

<option value="{{ a.id }}">

{{ a.patient }} - {{ a.doctor }}

</option>

{% endfor %}

</select>

<br>

<label>Doctor Fee</label>

<input type="number"
name="doctor_fee"
class="form-control">

<br>

<label>Medicine Charge</label>

<input type="number"
name="medicine_charge"
class="form-control">

<br>

<label>Room Charge</label>

<input type="number"
name="room_charge"
class="form-control">

<br>

<label>Payment Status</label>

<select
name="payment_status"
class="form-select">

<option>Paid</option>

<option>Pending</option>

</select>

<br>

<button class="btn btn-success">

Generate Bill

</button>

</form>

</div>

</div>

</div>

{% endblock %}
