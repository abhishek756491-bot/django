{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Add Doctor</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<label>Name</label>

<input type="text"
name="name"
class="form-control mb-3">

<label>Department</label>

<select
name="department"
class="form-select mb-3">

{% for d in departments %}

<option value="{{ d.id }}">

{{ d.name }}

</option>

{% endfor %}

</select>

<label>Specialization</label>

<input type="text"
name="specialization"
class="form-control mb-3">

<label>Phone</label>

<input type="text"
name="phone"
class="form-control mb-3">

<button class="btn btn-success">

Save

</button>

</form>

</div>

</div>

</div>

{% endblock %}
