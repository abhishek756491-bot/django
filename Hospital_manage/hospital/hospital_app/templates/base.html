<!DOCTYPE html>
<html lang="en">
<head>

        .sidebar a:hover{

        }

        }
    </style>

</head>
<body>

<div class="sidebar">

    <a href="">Dashboard</a>

</div>

<div class="content">

<a href="{% url 'logout' %}" class="btn btn-danger">

Logout

</a>
{% endblock %}

</div>
