{% extends 'base.html' %}

{% block title %}Edit Patient{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-warning">
<h3>Edit Patient</h3>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text"
class="form-control"
name="name"
value="{{ patient.name }}">
</div>

<div class="mb-3">
<label>Age</label>
<input type="number"
class="form-control"
name="age"
value="{{ patient.age }}">
</div>

<div class="mb-3">
<label>Gender</label>

<select class="form-select" name="gender">

<option {% if patient.gender == "Male" %}selected{% endif %}>Male</option>

<option {% if patient.gender == "Female" %}selected{% endif %}>Female</option>

<option {% if patient.gender == "Other" %}selected{% endif %}>Other</option>

</select>

</div>

<div class="mb-3">
<label>Phone</label>
<input type="text"
class="form-control"
name="phone"
value="{{ patient.phone }}">
</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control"
name="address">{{ patient.address }}</textarea>
</div>

<button class="btn btn-success">
Update
</button>

<a href="{% url 'patient_list' %}"
class="btn btn-secondary">
Back
</a>

</form>

</div>

</div>

</div>

{% endblock %}
