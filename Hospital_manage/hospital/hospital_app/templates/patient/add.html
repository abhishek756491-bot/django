{% extends 'base.html' %}

{% block title %}Add Patient{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow mt-4">

        <div class="card-header bg-primary text-white">
            <h3>Add Patient</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Gender</label>

                    <select name="gender" class="form-select">

                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>

                    </select>

                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Address</label>
                    <textarea name="address"
                              class="form-control"></textarea>
                </div>

                <button class="btn btn-success">
                    Save Patient
                </button>

                <a href="{% url 'patient_list' %}"
                   class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
